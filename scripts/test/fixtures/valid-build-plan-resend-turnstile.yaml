slug: resend-turnstile-test
name: Resend Turnstile Test
overview: Fixture for protected resend-form tests.
style: minimal
tone: professional
custom_domain: contact.example.com
pages:
  - id: home
    title: Home
    components:
      - type: prose
        markdown: |
          ## Hello
          A paragraph.
  - id: contact
    title: Contact
    components:
      - type: resend-form
        to: hello@example.com
        from: noreply@example.com
        subject: Message from resend-turnstile-test
        submit_label: Send
        success_message: Thanks, we will be in touch.
        turnstile: true
        fields:
          - { name: name, label: Your name, type: text, required: true }
          - { name: email, label: Email, type: email, required: true }
          - { name: message, label: Message, type: textarea, required: true }
nav:
  order: [home, contact]
contact:
  enabled: false
